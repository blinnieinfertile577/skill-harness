<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>skill-harness logo</title>
  <desc>Geometric buckle-style emblem for skill-harness.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#1643d6" />
      <stop offset="100%" stop-color="#39c5ff" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(88 80) rotate(45) scale(176)">
      <stop offset="0%" stop-color="#8fdcff" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#8fdcff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ring" x1="64" y1="52" x2="192" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d8f3ff" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
    <linearGradient id="core" x1="86" y1="74" x2="170" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#b9ecff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.32" />
    </filter>
  </defs>

  <rect width="256" height="256" rx="52" fill="url(#bg)" />
  <rect width="256" height="256" rx="52" fill="url(#glow)" />

  <g filter="url(#shadow)">
    <path
      d="M128 42 186 74v108l-58 32-58-32V74Z"
