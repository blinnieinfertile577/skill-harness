      fill="url(#core)"
    />
    <path
      d="M130 78c0-7.732 6.268-14 14-14h10c7.732 0 14 6.268 14 14v100c0 7.732-6.268 14-14 14h-10c-7.732 0-14-6.268-14-14Z"
      fill="url(#core)"
      opacity="0.92"
    />
    <rect x="102" y="106" width="52" height="44" rx="20" fill="#0a1837" />
    <rect x="112" y="116" width="32" height="24" rx="12" fill="url(#ring)" />

    <path
      d="M74 88h18c15.464 0 28 12.536 28 28v24c0 15.464-12.536 28-28 28H74"
      fill="none"
      stroke="#9be7ff"
      stroke-opacity="0.9"
      stroke-width="10"
      stroke-linecap="round"
    />
    <path
      d="M182 88h-18c-15.464 0-28 12.536-28 28v24c0 15.464 12.536 28 28 28h18"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.95"
      stroke-width="10"
      stroke-linecap="round"
    />
  </g>

  <circle cx="74" cy="88" r="7" fill="#dff7ff" />
  <circle cx="182" cy="168" r="7" fill="#dff7ff" opacity="0.86" />
